name: Deploy Antora site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Prepare Antora content
        run: bash scripts/prepare-antora-content.sh
        working-directory: .blog

      - name: Build Antora site
        run: npx -y -p @antora/cli@3.1 -p @antora/site-generator@3.1 antora antora-playbook.yml --to-dir ../site
        working-directory: .blog

      - name: Postprocess site output
        run: bash scripts/postprocess-site.sh ../site
        working-directory: .blog

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
